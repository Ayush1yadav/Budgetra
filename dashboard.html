<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Budgetra</title>
    <link rel="icon" type="image/svg+xml" href="Assets/logo.svg">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <!-- Top Navigation -->
    <header class="navbar">
        <div class="logo">
            <a href="index.html">
                <i class="fas fa-wallet"></i> Budgetra
            </a>
        </div>
        <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <div class="dashboard-container">
        <!-- Key Metrics Row -->
        <div class="summary-cards">
            <!-- Budget Setup Card -->
            <div class="card summary-card fade-in">
                <div class="card-icon">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="card-content">
                    <h3>Salary</h3>
                    <div class="budget-input-group">
                        <span>₹</span>
                        <input type="number" id="budgetInput" placeholder="Set Budget" min="0">
                        <button id="saveBudgetBtn">Save</button>
                    </div>
                </div>
            </div>

            <!-- Savings Setup Card -->
            <div class="card summary-card fade-in" style="animation-delay: 0.05s;">
                <div class="card-icon" style="background-color: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                    <i class="fas fa-piggy-bank"></i>
                </div>
                <div class="card-content">
                    <h3>Target Savings</h3>
                    <div class="budget-input-group">
                        <span>₹</span>
                        <input type="number" id="savingsInput" placeholder="Set Savings" min="0">
                        <button id="saveSavingsBtn">Save</button>
                    </div>
                </div>
            </div>

            <!-- Total Expenses Card -->
            <div class="card summary-card fade-in" style="animation-delay: 0.1s;">
                <div class="card-icon bg-danger">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="card-content">
                    <h3>Total Expenses</h3>
                    <h2 id="totalExpenseDisplay" class="amount text-danger">₹0.00</h2>
                </div>
            </div>

            <!-- Remaining Budget Card -->
            <div class="card summary-card fade-in" id="remainingBudgetCard" style="animation-delay: 0.2s;">
                <div class="card-icon bg-success">
                    <i class="fas fa-piggy-bank"></i>
                </div>
                <div class="card-content">
                    <h3>Remaining Budget</h3>
                    <h2 id="remainingBudgetDisplay" class="amount text-success">₹0.00</h2>
                    <p id="budgetWarning" class="warning-text hidden">
                        <i class="fas fa-exclamation-triangle"></i> Budget Exceeded!
                    </p>
                </div>
            </div>
        </div>

        <!-- Dashboard Layout Grid -->
        <div class="dashboard-grid">
            
            <!-- Left Panel: Add Entry Form & Charts -->
            <!-- Add New Expense -->
                <div class="card form-card slide-up">
                    <div class="card-header">
                        <h2><i class="fas fa-plus-circle"></i> Add New Expense</h2>
                    </div>
                    <form id="expenseForm">
                        <div class="form-group">
                            <label for="amount">Amount (₹)*</label>
                            <input type="number" id="amount" required min="0.01" step="0.01" placeholder="e.g. 1500">
                        </div>
                        <div class="form-group">
                            <label for="category">Category*</label>
                            <select id="category" required>
                                <option value="" disabled selected>Select a category</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Bills">Bills</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="date">Date*</label>
                            <input type="date" id="date" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Description (Optional)</label>
                            <input type="text" id="description" placeholder="What did you spend on?">
                        </div>
                        <div class="form-group">
                            <label for="proof">Attach Proof (Optional)</label>
                            <input type="file" id="proof" accept="image/*,application/pdf" style="padding: 0.5rem; background: var(--input-bg);">
                        </div>
                        <button type="submit" class="btn-primary">Add Expense</button>
                    </form>
                </div>

                <!-- Visual Analytics -->
                <div class="card charts-card slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-pie"></i> Visual Analytics</h2>
                    </div>
                    <div class="chart-container">
                        <canvas id="categoryPieChart"></canvas>
                    </div>
                    <div class="chart-container mt-4">
                        <canvas id="expenseBarChart"></canvas>
                    </div>
                </div>

            <!-- Right Panel: Data Table -->
            <div class="card list-card slide-up" style="animation-delay: 0.2s;">
                    <div class="card-header flex-between">
                        <h2><i class="fas fa-list-ul"></i> Transaction History</h2>
                        <button id="clearAllBtn" class="btn-danger-outline">
                            <i class="fas fa-trash-alt"></i> Clear All
                        </button>
                    </div>
                    
                    <!-- Search and Filters -->
                    <div class="filters-container">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Search expenses by description...">
                        </div>
                        <select id="filterCategory">
                            <option value="All">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Expenses Table -->
                    <div class="table-responsive">
                        <table id="expensesTable">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Category</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                    <th>Proof</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="expenseTableBody">
                                <!-- JS will populate items here -->
                            </tbody>
                        </table>
                        
                        <!-- Empty State Message -->
                        <div id="noDataMessage" class="no-data-msg hidden">
                            <p>No expenses found.</p>
                            <small class="text-secondary">Try adding a new expense or clearing your filters.</small>
                        </div>
                    </div>
                </div>
            
        </div>
    </div>
    
    <!-- App Logic -->
    <script src="script.js"></script>
</body>
</html>
